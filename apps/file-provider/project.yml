name: StarkeepFileProvider
options:
  bundleIdPrefix: com.starkeep
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  StarkeepFileProvider:
    type: application
    platform: macOS
    sources:
      - path: App
        type: group
      - path: Shared
        type: group
    entitlements:
      path: App/App.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.application-groups:
          - group.com.starkeep.fileprovider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starkeep.fileprovider-host
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_CFBundleDisplayName: Starkeep
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: StarkeepFileProviderExtension
      - target: StarkeepFinderSync

  StarkeepFileProviderExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FileProviderExtension
        type: group
      - path: Shared
        type: group
    info:
      path: FileProviderExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionFileProviderDocumentGroup: group.com.starkeep.fileprovider
          NSExtensionPointIdentifier: com.apple.fileprovider-nonui
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).Extension
          NSExtensionFileProviderSupportsEnumeration: true
    entitlements:
      path: FileProviderExtension/Extension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.starkeep.fileprovider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starkeep.fileprovider-host.extension
        GENERATE_INFOPLIST_FILE: false

  StarkeepFinderSync:
    type: app-extension
    platform: macOS
    sources:
      - path: FinderSyncExtension
        type: group
      - path: Shared
        type: group
    info:
      path: FinderSyncExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).FinderSyncExtension
    entitlements:
      path: FinderSyncExtension/FinderSync.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.starkeep.fileprovider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starkeep.fileprovider-host.findersync
        GENERATE_INFOPLIST_FILE: false
