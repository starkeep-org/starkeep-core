services:
  postgres:
    image: postgres:17-alpine
    container_name: starkeep-cloud-postgres
    environment:
      POSTGRES_DB: starkeep_cloud
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - starkeep-cloud-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d starkeep_cloud"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  starkeep-cloud-pg:
